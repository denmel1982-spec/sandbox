server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Максимальный размер загружаемых файлов
    client_max_body_size 100M;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # API маршруты - прокси на Laravel backend
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Админ панель
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Статические файлы для frontend (в production)
    location /assets {
        alias /var/www/html/public/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Основное приложение (React SPA в production)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM обработка
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Защита от доступа к скрытым файлам
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    # WebSocket поддержка для Centrifugo (опционально)
    location /connection {
        proxy_pass http://centrifugo:8000/connection;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
